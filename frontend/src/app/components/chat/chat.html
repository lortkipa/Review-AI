<app-header
    [user]="user()"></app-header>

<main>
    <app-panel-left
        [code]="code()"
        [language]="review()?.language ?? ''"
        (codeInput)="updateCode($event)"
        (submitReview)="submitReview()"></app-panel-left>

    <app-panel-right
        [review]="review()"
        [loading]="isAiProcessing()"></app-panel-right>
</main>
