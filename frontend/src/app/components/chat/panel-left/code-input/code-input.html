<section>
    <div class="line-numbers" id="line-numbers">
        <div class="line-num" *ngFor="let i of getRange(lineCount())">{{i}}</div>
    </div>
    <textarea 
        #codeInput
        class="code-textarea" 
        id="code-input"
        placeholder="// Paste your code here"
        spellcheck="false"
        autocorrect="off" 
        autocomplete="off"
        (input)="setLineCount(codeInput.value)"
        (keydown)="handleTab($event, codeInput)"></textarea>
</section>
