<section>
    <app-toolbar
        [language]="language"></app-toolbar>

    <app-code-input
        [code]="code"
        (codeInput)="emitCodeInput($event)"></app-code-input>

    <app-action-bar
        [disableReviewBtn]="code.trim() == ''"
        [disableFixBtn]="true"
        (submitReview)="emitSubmitReview()"></app-action-bar>
</section>
