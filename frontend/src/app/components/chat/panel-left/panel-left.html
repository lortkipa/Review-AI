<section>
    <app-toolbar
        [language]="language"
        (codeClear)="emitCodeInput('')"></app-toolbar>

    <app-code-input
        [code]="code"
        (codeInput)="emitCodeInput($event)"></app-code-input>

    <app-action-bar
        [disableBtns]="code.trim() == ''"
        (submitReview)="emitSubmitReview()"></app-action-bar>
</section>
