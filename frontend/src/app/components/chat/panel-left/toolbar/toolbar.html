<section>
    <div class="toolbar-left">
        <div class="detected-lang" id="detected-lang"  *ngIf="!!language">
            <div class="lang-dot"></div>
            <span id="detected-lang-text">{{language}}</span>
        </div>
    </div>
    <div class="toolbar-right">
        <button class="btn-tool" (click)="emitCodeClear()">Clear</button>
    </div>
</section>
