<section class="animate-in" [ngClass]="{
                'sev-high': issue.severity === 'critical',
                'sev-medium': issue.severity === 'medium',
                'sev-low': issue.severity === 'low'
                }">
    <div class="issue-header">
        <div class="issue-title">{{issue.title}}</div>
        <span 
            class="sev-badge"
            [ngClass]="{
                'sev-high-bg': issue.severity === 'critical',
                'sev-medium-bg': issue.severity === 'medium',
                'sev-low-bg': issue.severity === 'low'
                }">{{issue.severity}}</span>
    </div>
    <div class="issue-desc">
        {{issue.description}}
    </div>
    <div class="issue-line">{{issue.lines.length > 1 ? 'Lines' : 'Line'}} {{issue.lines}}</div>
    <button 
        class="why-btn"
        (click)="toggleExplanation()">{{showExplanation() ? '▲ Hide explanation' : '▼ Why is this bad?'}}</button>
    <div class="why-panel" *ngIf="showExplanation()">{{issue.explanation}}</div>
</section>
