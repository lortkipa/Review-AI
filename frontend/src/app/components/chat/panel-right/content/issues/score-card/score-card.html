<div class="score-card animate-in">
    <div class="score-ring"><svg viewBox="0 0 72 72">
            <circle cx="36" cy="36" r="28" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="6"></circle>
            <circle cx="36" cy="36" r="28" fill="none" stroke-width="6"
                stroke-dasharray="175.92918860102841" stroke-linecap="round"
                transform="rotate(-90 36 36)" style="transition:stroke-dashoffset 1s ease"
                [attr.stroke]="scoreColor"
                [attr.stroke-dashoffset]="dashOffset"></circle>
            <text x="36" y="41" text-anchor="middle" font-family="JetBrains Mono,monospace" font-size="14"
                font-weight="600" fill="#f87171"
                [attr.fill]="scoreColor">{{score}}</text>
        </svg></div>
    <div class="score-info">
        <div class="score-label">Code quality score</div>
        <div class="score-pills">
            <span 
                class="pill pill-red"
                *ngIf="criticalErrCount > 0">⚠ {{criticalErrCount}} critical</span>
            <span 
                class="pill pill-amber"
                *ngIf="mediumErrCount > 0">◆ {{mediumErrCount}} medium</span>
            <span 
                class="pill pill-green"
                *ngIf="lowErrCount > 0">● {{lowErrCount}} low</span>
        </div>
    </div>
</div>
